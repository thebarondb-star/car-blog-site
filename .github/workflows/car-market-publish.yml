name: 자동차시장 글 발행 (매일 KST 10:00)

on:
  schedule:
    # UTC 01:00 = KST 10:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 자동차시장 전용 글 발행 (신차 감지 or 시장동향)
        run: |
          curl -s -X POST "https://www.dr-rent.net/api/car-market-publish" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --max-time 540 \
            --retry 2 \
            --retry-delay 10
