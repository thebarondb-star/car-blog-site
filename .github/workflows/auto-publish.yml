name: 자동 글 발행 (매일 KST 08:30)

on:
  schedule:
    # UTC 23:30 = KST 08:30
    - cron: '30 23 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 일반 로테이션 글 발행 (호갱탈출/장기렌트정보/자동차시장)
        run: |
          curl -s -X POST "https://www.dr-rent.net/api/auto-publish" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --max-time 540 \
            --retry 2 \
            --retry-delay 10
